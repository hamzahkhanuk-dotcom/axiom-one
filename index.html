<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXIOM ONE — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #080808;
      --charcoal: #1a1a1a;
      --mid: #2e2e2e;
      --dim: #555555;
      --muted: #888888;
      --light: #c8c8c8;
      --white: #f5f5f5;
      --pure: #ffffff;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
    }

    /* ── AMBIENT GLOW ── */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-top {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      top: -180px;
      left: 50%;
      transform: translateX(-50%);
    }
    .glow-bottom {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.025) 0%, transparent 70%);
      bottom: -150px;
      right: -100px;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    /* ── WORDMARK / LOGO ── */
    .wordmark {
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: clamp(10px, 1.2vw, 13px);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--dim);
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      animation: fadeUp 1.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── CENTRE CONTENT ── */
    .centre {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* ── EYE MARK ── */
    .eye {
      width: 32px;
      height: 32px;
      margin-bottom: 56px;
      animation: fadeUp 1.4s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .eye-ring {
      stroke: var(--dim);
      fill: none;
      stroke-width: 1;
      animation: rotateSlow 14s linear infinite;
      transform-origin: 16px 16px;
    }
    .eye-dot {
      fill: var(--white);
    }

    /* ── HERO NAME ── */
    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 18vw, 220px);
      line-height: 0.88;
      letter-spacing: 0.03em;
      color: var(--pure);
      animation: fadeUp 1.4s 0.35s cubic-bezier(0.22,1,0.36,1) both;
      user-select: none;
    }

    .hero-sub {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 9vw, 110px);
      line-height: 0.9;
      letter-spacing: 0.06em;
      color: var(--mid);
      animation: fadeUp 1.4s 0.45s cubic-bezier(0.22,1,0.36,1) both;
      user-select: none;
      margin-bottom: 40px;
    }

    /* ── DIVIDER ── */
    .rule {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--dim), transparent);
      margin: 0 auto 40px;
      animation: fadeUp 1.4s 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── TAGLINE ── */
    .tagline {
      font-weight: 200;
      font-size: clamp(13px, 1.6vw, 18px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--light);
      max-width: 540px;
      line-height: 2;
      animation: fadeUp 1.4s 0.65s cubic-bezier(0.22,1,0.36,1) both;
      margin-bottom: 16px;
    }

    /* ── COMING SOON ── */
    .coming-soon {
      font-weight: 300;
      font-size: clamp(10px, 1.1vw, 12px);
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--dim);
      animation: fadeUp 1.4s 0.75s cubic-bezier(0.22,1,0.36,1) both;
      margin-bottom: 72px;
    }
    .coming-soon span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--dim);
      border-radius: 50%;
      vertical-align: middle;
      margin: 0 14px 2px;
    }

    /* ── NOTIFY FORM ── */
    .notify-wrap {
      animation: fadeUp 1.4s 0.88s cubic-bezier(0.22,1,0.36,1) both;
      width: 100%;
      max-width: 420px;
    }

    .notify-label {
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--dim);
      display: block;
      margin-bottom: 18px;
      text-align: center;
    }

    .notify-form {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--mid);
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(8px);
      transition: border-color 0.3s;
    }
    .notify-form:focus-within {
      border-color: var(--muted);
    }

    .notify-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 18px 20px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--white);
    }
    .notify-input::placeholder {
      color: var(--dim);
    }

    .notify-btn {
      background: var(--white);
      color: var(--black);
      border: none;
      padding: 18px 28px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .notify-btn:hover {
      background: var(--light);
    }
    .notify-btn:active {
      background: var(--muted);
    }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--mid);
      white-space: nowrap;
      animation: fadeUp 1.4s 1.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── SCAN LINE ANIMATION ── */
    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
      animation: scan 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 2;
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes scan {
      0%   { top: -4px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100vh; opacity: 0; }
    }

    /* ── CURSOR GLOW FOLLOW ── */
    .cursor-glow {
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.045) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease, top 0.12s ease;
      z-index: 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .wordmark { top: 24px; font-size: 9px; }
      .footer   { bottom: 20px; font-size: 9px; }
      .coming-soon { letter-spacing: 0.35em; }
      .notify-btn { padding: 18px 20px; }
      .rule { height: 40px; margin-bottom: 30px; }
      .eye  { margin-bottom: 40px; }
    }
  </style>
</head>
<body>

  <div class="glow glow-top"></div>
  <div class="glow glow-bottom"></div>
  <div class="scanline"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="wordmark">Axiom Robotics &nbsp;/&nbsp; Est. 2026</div>

  <main class="page">
    <div class="centre">

      <!-- Eye mark -->
      <svg class="eye" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <circle class="eye-ring" cx="16" cy="16" r="14" stroke-dasharray="6 4" />
        <circle class="eye-dot" cx="16" cy="16" r="3" />
      </svg>

      <!-- Name -->
      <h1 class="hero-name">AXIOM</h1>
      <h2 class="hero-sub">ONE</h2>

      <div class="rule"></div>

      <!-- Tagline -->
      <p class="tagline">The last machine you will ever&nbsp;need&nbsp;to&nbsp;fear.</p>

      <!-- Coming soon -->
      <p class="coming-soon">Coming Soon <span></span> 2027</p>

      <!-- Notify form -->
      <div class="notify-wrap">
        <span class="notify-label">Be first to know</span>
        <div class="notify-form">
          <input
            class="notify-input"
            type="email"
            placeholder="your@email.com"
            aria-label="Email address"
          />
          <button class="notify-btn" type="button">Notify me</button>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">Axiom One &mdash; Confidential Preview</footer>

  <script>
    // Cursor glow follow
    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top  = e.clientY + 'px';
    });

    // Notify button micro-interaction
    document.querySelector('.notify-btn').addEventListener('click', function () {
      const input = document.querySelector('.notify-input');
      const val   = input.value.trim();
      if (!val || !val.includes('@')) {
        input.style.borderBottom = '1px solid #555';
        input.focus();
        return;
      }
      this.textContent = 'Registered';
      this.style.background = '#2e2e2e';
      this.style.color = '#f5f5f5';
      this.style.letterSpacing = '0.3em';
      input.value = '';
      input.placeholder = 'You\'re on the list.';
      input.disabled = true;
      this.disabled = true;
    });
  </script>

</body>
</html>
